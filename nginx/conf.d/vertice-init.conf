# Configuração inicial — só HTTP, para validação do Certbot
# Usar ANTES de obter o certificado SSL

server {
    listen 80;
    server_name vertice.klauberfischer.online;

    # Desafio ACME (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enquanto não tem SSL, proxy direto para o app
    location / {
        proxy_pass http://vertice-ia:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
