# Configuração de produção — HTTP → HTTPS redirect + proxy HTTPS

server {
    listen 80;
    server_name vertice.klauberfischer.online;

    # Desafio ACME (renovação automática)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vertice.klauberfischer.online;

    ssl_certificate     /etc/letsencrypt/live/vertice.klauberfischer.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vertice.klauberfischer.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Streamlit — suporte a WebSocket obrigatório
    location / {
        proxy_pass http://vertice-ia:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
